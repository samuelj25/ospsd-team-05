version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout

      - run:
          name: "Install UV and add to PATH"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh || exit 1
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version

      - run:
          name: "Create venv & install dependencies via uv sync"
          command: |
            source $BASH_ENV
            uv venv --python 3.11
            source .venv/bin/activate
            uv sync --all-packages

      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            mypy --version
            pytest --version
            coverage --version

      - run:
          name: "Clean Python Cache"
          command: |
            find . -type d -name "__pycache__" -exec rm -rf {} +
            find . -type f -name "*.pyc" -delete

      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Ruff (lint + format check)"
          command: |
            source .venv/bin/activate
            uv run ruff check .

  typecheck:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "MyPy (strict)"
          command: |
            source .venv/bin/activate
            uv run mypy --strict .

  unit_tests:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Create results directories"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit coverage-reports/htmlcov

      - run:
          name: "Run unit tests"
          command: |
            source .venv/bin/activate
            uv run pytest components/google_calendar_client_impl/tests/unit/ --junitxml=test-results/unit/results.xml

      - store_test_results:
          path: test-results/unit

      - store_artifacts:
          path: test-results/unit
          destination: test-results/unit

  integration_tests:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Setup GCP Credentials"
          command: |
            if [ -n "$GCP_CREDENTIALS_JSON_BASE64" ] && [ -n "$GCP_TOKEN_JSON_BASE64" ]; then
                echo "$GCP_CREDENTIALS_JSON_BASE64" | base64 --decode > credentials.json
                echo "$GCP_TOKEN_JSON_BASE64" | base64 --decode > token.json
            else
                echo "Error: Base64 GCP variables are not set. Failing Step."
                exit 1
            fi
      - run:
          name: "Create results directories"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration

      - run:
          name: "Run integration tests"
          command: |
            source .venv/bin/activate
            uv run pytest tests/integration/ --no-cov --junitxml=test-results/integration/results.xml

      - store_test_results:
          path: test-results/integration

      - store_artifacts:
          path: test-results/integration
          destination: test-results/integration

  e2e_tests:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Setup GCP Credentials"
          command: |
            if [ -n "$GCP_CREDENTIALS_JSON_BASE64" ] && [ -n "$GCP_TOKEN_JSON_BASE64" ]; then
                echo "$GCP_CREDENTIALS_JSON_BASE64" | base64 --decode > credentials.json
                echo "$GCP_TOKEN_JSON_BASE64" | base64 --decode > token.json
            else
                echo "Error: Base64 GCP variables are not set. Failing Step."
                exit 1
            fi
      - run:
          name: "Create results directories"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/e2e

      - run:
          name: "Run E2E tests"
          command: |
            source .venv/bin/activate
            uv run pytest tests/e2e/ --no-cov --junitxml=test-results/e2e/results.xml

      - store_test_results:
          path: test-results/e2e

      - store_artifacts:
          path: test-results/e2e
          destination: test-results/e2e

workflows:
  build_and_test:
    jobs:
      - build
      - lint:
          requires: [build]
      - typecheck:
          requires: [build]
      - unit_tests:
          requires: [build]
      - integration_tests:
          requires: [unit_tests]
      - e2e_tests:
          requires: [integration_tests]