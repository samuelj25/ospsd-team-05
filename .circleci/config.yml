version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout

      - run:
          name: "Install UV and add to PATH"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version

      - run:
          name: "Create venv & install dependencies via uv sync"
          command: |
            source $BASH_ENV
            uv venv --python 3.11
            source .venv/bin/activate
            uv sync

      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            mypy --version
            pytest --version
            coverage --version

      - persist_to_workspace:
          root: .
          paths:
            - .

  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Ruff (lint + format check)"
          command: |
            source .venv/bin/activate
            uv run ruff check .

  typecheck:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "MyPy (strict)"
          command: |
            source .venv/bin/activate
            uv run mypy --strict .

  test_unit_integration:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Create results directories"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit_integration coverage-reports/htmlcov

      - run:
          name: "Run unit + integration tests with coverage"
          command: |
            source .venv/bin/activate
            uv run pytest

      - run:
          name: "Coverage summary"
          when: always
          command: |
            source .venv/bin/activate
            uv run coverage report || true

      - store_test_results:
          path: test-results/unit_integration

      - store_artifacts:
          path: coverage-reports
          destination: coverage-reports

      - store_artifacts:
          path: test-results/unit_integration
          destination: test-results/unit_integration

workflows:
  build_and_test:
    jobs:
      - build
      - lint:
          requires: [build]
      - typecheck:
          requires: [build]
      - test_unit_integration:
          requires: [build]